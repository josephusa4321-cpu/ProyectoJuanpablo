<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Reportes - Cargun360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #141417;
            --accent: #A78BFA;
            --text: #ffffff;
            --text-dim: #94a3b8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 4rem;
        }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 4rem;
            margin: 0;
            font-weight: 400;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(167, 139, 250, 0.1);
            color: var(--accent);
            border: 1px solid rgba(167, 139, 250, 0.2);
            border-radius: 99px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }
        .report-grid {
            display: grid;
            gap: 1.5rem;
        }
        .report-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }
        .report-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(167, 139, 250, 0.05);
        }
        .info h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.25rem;
        }
        .info p {
            margin: 0;
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .arrow {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .footer {
            margin-top: auto;
            padding: 4rem 0;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="badge">SISTEMA AUTOMATIZADO</span>
            <h1>Cargun360</h1>
            <p style="color: var(--text-dim)">Portal Central de Reportes Financieros</p>
        </header>

        <div class="report-grid">
            <!-- REPORTE_ITEM -->
            <a href="reportes_generados/Reporte_ADMIN_JuanPabloBayonaAreiza.html" class="report-card">
                <div class="info">
                    <h3>ADMIN</h3>
                    <p>Propietario: JuanPabloBayonaAreiza</p>
                </div>
                <div class="arrow">→</div>
            </a>
            <a href="reportes_generados/Reporte_UUO-808_JosephRestrepo.html" class="report-card">
                <div class="info">
                    <h3>UUO-808</h3>
                    <p>Propietario: JosephRestrepo</p>
                </div>
                <div class="arrow">→</div>
            </a>
            <!-- FIN_REPORTE_ITEM -->
        </div>

        <div class="footer">
            © 2026 Cargun360 · Generado Automáticamente por LUPA MVP
        </div>
    </div>
</body>
</html>
