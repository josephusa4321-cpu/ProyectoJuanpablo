<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Reportes - Cargun360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Instrument+Serif&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030406;
            --card: #0c0d10;
            --accent: #A78BFA;
            --accent-glow: rgba(167, 139, 250, 0.4);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
            overflow-x: hidden;
        }
        /* Ambient Background Glow */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%;
            width: 40%; height: 40%;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }
        .container {
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        header {
            text-align: center;
            margin-bottom: 3.5rem;
            margin-top: 2rem;
        }
        header h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 3.5rem;
            margin: 0.5rem 0;
            font-weight: 400;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            background: var(--glass);
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            backdrop-filter: blur(10px);
        }
        .report-grid {
            display: grid;
            gap: 1rem;
        }
        .report-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
            border-radius: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .report-card::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }
        .report-card:hover {
            border-color: rgba(167, 139, 250, 0.5);
            background: #111218;
            transform: scale(1.02);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5), 0 0 20px -5px var(--accent-glow);
        }
        .report-card:hover::after {
            transform: translateX(100%);
        }
        .report-card:active { transform: scale(0.98); }

        .info { display: flex; flex-direction: column; gap: 0.25rem; }
        .info .type-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .info h3 {
            margin: 0;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .info p {
            margin: 0;
            color: var(--text-dim);
            font-size: 0.85rem;
        }
        .arrow {
            width: 44px;
            height: 44px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            transition: all 0.3s ease;
        }
        .report-card:hover .arrow {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: rotate(-45deg);
        }

        /* Hero Card Style */
        .report-card.main-report {
            background: linear-gradient(145deg, #16171d 0%, #0c0d10 100%);
            border: 1px solid rgba(167, 139, 250, 0.3);
            margin-bottom: 1rem;
            padding: 2rem 1.5rem;
        }
        .report-card.main-report h3 {
            font-size: 1.8rem;
            background: linear-gradient(90deg, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .main-report .badge-main {
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            display: inline-block;
            width: fit-content;
        }

        .footer {
            margin-top: 5rem;
            padding-bottom: 3rem;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-align: center;
            opacity: 0.6;
        }
        
        @media (max-width: 480px) {
            body { padding: 1rem; }
            header h1 { font-size: 2.8rem; }
            .report-card { padding: 1rem 1.25rem; }
        }
    </style>

</head>
<body>
    <div class="container">
        <header>
            <span class="badge">SISTEMA AUTOMATIZADO</span>
            <h1>Cargun360</h1>
            <p style="color: var(--text-dim)">Portal Central de Reportes Financieros</p>
        </header>

        <div class="report-grid">
            <!-- REPORTE_ITEM -->
            <a href="reportes_generados/Reporte_CONSOLIDADO_JosephRestrepo.html" class="report-card main-report">
                <div class="info">
                    <span class="badge-main">PRINCIPAL</span>
                    <span class="type-label">Consolidado Mensual</span>
                    <h3>FLOTA TOTAL</h3>
                    <p>Resumen de todos los vehículos</p>
                </div>
                <div class="arrow">→</div>
            </a>
            <a href="reportes_generados/Reporte_UUO-808_JosephRestrepo.html" class="report-card">
                <div class="info">
                    
                    <span class="type-label">Detalle Vehículo</span>
                    <h3>UUO-808</h3>
                    <p>Propietario: JosephRestrepo</p>
                </div>
                <div class="arrow">→</div>
            </a>
            <!-- FIN_REPORTE_ITEM -->
        </div>


        <div class="footer">
            © 2026 Cargun360 · Generado Automáticamente por LUPA MVP
        </div>
    </div>
</body>
</html>
